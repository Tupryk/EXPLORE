rl_method: "TD7"
verbose: 1
total_timesteps: 75000
timesteps_before_training: 5000
checkpoint_freq: 100000
output_dir: ${hydra:runtime.output_dir}
device: "cpu"

TD7:
  batch_size: 10000
  buffer_size: 1e6
  discount: 0.95
  target_update_rate: 250
  exploration_noise: 0.05
  value_clip: [0., 2.]
  
  # TD3
  target_policy_noise: 0.05
  noise_clip: 0.1
  policy_freq: 2
  
  # LAP
  alpha: 0.4
  min_priority: 1
  
  # TD3+BC
  lmbda: 0.1
  
  # Checkpointing
  max_eps_when_checkpointing: 20
  steps_before_checkpointing: 75e4 
  reset_weight: 0.9
  
  # Encoder Model
  zs_dim: 256
  enc_hdim: 256
  encoder_lr: 1e-3
  
  # Critic Model
  critic_hdim: 256
  critic_lr: 1e-3
  
  # Actor Model
  actor_hdim: 256
  actor_lr: 1e-3

env:
  min_cost: 0.01
  max_steps: 64
  sparse_reward: true
  schedule_alpha_end_step: 50000
  schedule_alpha_block: 5000
  use_csrl: true
  verbose: 1

  tau_action: 0.05
  stepsize: 0.05
  
  stable_configs_path: "configs/stable/double_sphere.h5"

  q: [0,3]
  q_dot: [0,3]
  q_obj_dot: 3
  P: ["obj"]
  G: ["obj"]

  obs_pos_scale: 1.0
  obs_vel_scale: 0.05
  obs_ref_err_scale: 20.0

  q_weight: 0.2

  sim_interface:
    parallel_sims: 80
    xml_path: "configs/mujoco_/doubleSphere.xml"
    tau_sim: 0.005
    verbose: 1

    camera: "fixed_cam"
    render_w: 640
    render_h: 480

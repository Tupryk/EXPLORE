RRT:
  verbose: 1
  max_nodes_per_tree: 2500
  sample_uniform_prob: 0.
  horizon: 1
  path_diff_thresh: 0.05
  target_min_dist: 10.
  target_prob: .2
  disable_node_max_strikes: 1
  sample_uniform: false
  warm_start: false
  threading: true  # Depending on the hardware this may lead to faster computations.
  start_idx: -1
  end_idx: -1
  sampling_strategy: rs
  n_best_actions: 16  # Only for random sampling strategy
  cem_steps: 10  # Only for CEM
  output_dir: ${hydra:runtime.output_dir}
  knnK: 16

  use_flow: true
  flow_model:
    arch: [256, 256]
    learn_every: 100
    device: "cuda"
    nepochs: 100
    batch_size: 512
    dataset_max_size: 128000
    steps: 128
    max_training_runs: 25

  # Environment specific
  min_cost: 0.02
  stepsize: 0.1
  sample_count: 500
  max_configs: 128
  q_mask:
  - 1
  - 1
  - 1
  - 1
  - 1
  - 1
  - 2
  - 2
  - 2
  - .25
  - .25
  - .25
  - .25
  geoms_in_cost: []
  geoms_in_cost_weights: []
  objs: []
  contacts: []
  dist_max: 0.2
  dist_weight: 0.1
  velocity_weight: 0.01
  
  sim:
    tau_sim: 0.005
    tau_action: 0.2
    interpolate_actions: true
    joints_are_same_as_ctrl: true
    use_spline_ref: false
    mujoco_xml: configs/mujoco_/twoFingersCube.xml
    camera: fixed_cam
configs_path: configs/stable/twoFingersCube.h5

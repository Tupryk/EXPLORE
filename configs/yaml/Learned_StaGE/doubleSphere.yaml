output_dir: ${hydra:runtime.output_dir}
device: "cpu"

eval_freq: 400
eval_count: 10

agent_sampled_actions: 10
max_loops_before_training: 250
failure_ratio: 3.

loop_count: 2500
in_loop_training_steps: 10

TD7:
  batch_size: 10000
  buffer_size: 1e6
  discount: 0.99
  target_update_rate: 250
  exploration_noise: 0.15
  value_clip: [0., 1.]
  
  # TD3
  target_policy_noise: 0.05
  noise_clip: 0.1
  policy_freq: 2
  
  # LAP
  alpha: 0.4
  min_priority: 1
  
  # TD3+BC
  lmbda: 0.01
  
  # Checkpointing
  max_eps_when_checkpointing: 20
  steps_before_checkpointing: 75e4 
  reset_weight: 0.9
  
  # Encoder Model
  zs_dim: 256
  enc_hdim: 256
  encoder_lr: 1e-3
  
  # Critic Model
  critic_hdim: 256
  critic_lr: 1e-3
  
  # Actor Model
  actor_hdim: 256
  actor_lr: 1e-3

RRT:
  verbose: 0
  log_data: false
  output_dir: ${hydra:runtime.output_dir}
  
  max_expansions_per_tree: 50
  max_configs: -1
  
  # StaGE params
  remove_expanded: true

  # Distance threshholds
  min_cost: 0.01

  # MPC actions
  tau_action: 0.05
  stepsize: 0.05

  # Distance measurements
  q: [0,3]
  q_dot: [0,3]
  q_obj_dot: 3
  P: ["obj"]
  G: ["obj"]

  q_weight: 0.2

  sim_interface:
    parallel_sims: 10
    xml_path: "configs/mujoco_/fingerRamp.xml"
    tau_sim: 0.005
    verbose: 1

    camera: "fixed_cam"
    render_w: 640
    render_h: 480

configs_path: "configs/stable/finger_ramp_big.h5"

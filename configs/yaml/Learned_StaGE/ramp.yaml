output_dir: ${hydra:runtime.output_dir}
device: "cpu"

checkpoint_freq: 10
eval_freq: 10

agent_sampled_actions: 10
loops_before_training: 1

loop_count: 1000
in_loop_training_steps: 100

TD7:
  batch_size: 2500
  buffer_size: 1e6
  discount: 0.99
  target_update_rate: 250
  exploration_noise: 0.05
  value_clip: [0., 1.]
  
  # TD3
  target_policy_noise: 0.05
  noise_clip: 0.1
  policy_freq: 2
  
  # LAP
  alpha: 0.4
  min_priority: 1
  
  # TD3+BC
  lmbda: 0.1
  
  # Checkpointing
  max_eps_when_checkpointing: 20
  steps_before_checkpointing: 75e4 
  reset_weight: 0.9
  
  # Encoder Model
  zs_dim: 128
  enc_hdim: 128
  encoder_lr: 1e-3
  
  # Critic Model
  critic_hdim: 128
  critic_lr: 1e-3
  
  # Actor Model
  actor_hdim: 128
  actor_lr: 1e-3

RRT:
  verbose: 3
  output_dir: ${hydra:runtime.output_dir}
  
  start_idx: [0]
  max_expansions_per_tree: 2500
  max_configs: -1
  
  # StaGE params
  remove_expanded: true

  # Distance threshholds
  min_cost: 0.01
  path_diff_thresh: 0.05
  target_min_dist: 1000000.

  # MPC actions
  tau_action: 0.1
  stepsize: 0.1

  # Distance measurements
  q: [0, 3]
  q_dot: [0, 3]
  q_obj_dot: 3
  P: [
    "l_fing", "obj",
  ]
  G: [
    "obj",
  ]

  obs_pos_scale: 1.0
  obs_vel_scale: 0.1
  obs_ref_err_scale: 10.0

  q_weight: 1.

  sim_interface:
    parallel_sims: 100
    xml_path: "configs/mujoco_/doubleSphere.xml"
    tau_sim: 0.005
    verbose: 1

    camera: "fixed_cam"
    render_w: 640
    render_h: 480

configs_path: "configs/stable/double_sphere.h5"

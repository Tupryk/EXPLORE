rl_method: "SAC"
verbose: 1
total_timesteps: 2e6
output_dir: ${hydra:runtime.output_dir}
device: "cpu"
net_arch: [256, 256]
save_freq: 25e4
scheduler_rate: 0.01
env:
  time_scaling: 1.0
  stepsize: 0.04
  max_steps: 125
  use_schedule: true
  schedule_alpha_update_rate: 100
  schedule_alpha_update_step: 0.001
  schedule_alpha_init: 0.1
  actions_noise_sigma: 0.0
  use_vel: true
  guiding: true
  guiding_prob: 1.
  start_config_idx: -1
  target_config_idx: -1
  goal_conditioning: true
  use_vision: false
  render_w: 640
  render_h: 480
  camera_filter: "balls_mask"
  verbose: 1
  sim:
    tau_sim: 0.005
    tau_action: 0.1
    interpolate_actions: true
    joints_are_same_as_ctrl: true
    use_spline_ref: false
    mujoco_xml: configs/mujoco_/twoFingersCube.xml
    camera: fixed_cam
  trajectory_data_path: "data/SpheresBoxMaxConfigs/2"  # TODO: either make this optional or remove stable_configs_path and mujoco_xml or idk.
  stable_configs_path: "configs/stable/twoFingersCube.h5"
